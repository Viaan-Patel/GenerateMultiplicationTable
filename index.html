<!DOCTYPE html>
<html>
<head>
<title>Generate a Multiplication Table</title>

<style>
body{
    background-color: blue;
    display:flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#container{
background-color: white;
border-radius:11px;
padding:10px 20px;
text-align: center;
box-shadow: 0 0 10px wheat;
}
h1{
    color:purple;
    font-family: arial;
}
button{
    border-radius: 5px;
    color:wheat;
    background-color: darkseagreen;
    border:none;
    padding:10px 15px;
}
input{
    padding:10px 15px;
    border-radius: 5px;
    border:1px solid lightgrey;
}
#result{
    margin-top: 20px;
    color:lightsteelblue;
    font-size: 20px;
}
</style>
</head>
<body>
<center>
<div id="container">
<h1>Multiplication Table Generator</h1>
<input type="number" placeholder="Enter a number to get Multiplication Table" id="num1">
<button onclick="tableGenerator()">Generate Table</button>
<div id="result"></div>
</div>
</center>
<script>
function tableGenerator(){
    let numInput = document.getElementById("num1").value;

    document.getElementById("result").innerHTML = "";

    if(numInput==="" || isNaN(numInput)){
    document.getElementById("result").innerHTML = "<p>Please enter a valid number</p>";
    return;
    }
    let table = `<h2>Multiplication table for ${numInput}</h2>`;
    for(let i = 1; i<11; i++){
    table += `${numInput}x${i} = ${numInput*i}<br></br>`;

    }
     document.getElementById("result").innerHTML = table;
}



</script>
</body>
</html>
